<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini App</title>

<style>
  body {
    margin: 0;
    background: #111;
  }

  #loader {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }

  .spinner {
    width: 60px;
    height: 60px;
    border: 6px solid #222;
    border-top: 6px solid white;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>

</head>
<body>

<div id="loader">
  <div class="spinner"></div>
</div>

<h1 style="color:white;text-align:center;margin-top:100px;">
  Mini App загрузилась
</h1>

<script>
  setTimeout(() => {
    document.getElementById("loader").remove();
  }, 2000);
</script>

</body>
</html>
