<!DOCTYPE html>
<html>
<head>

  <title>Mini App NFT</title>
</head>

  <!-- ВСТАВИТЬ СЮДА -->
  <style>
    body { margin: 0; }

    #loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #333;
      border-top: 5px solid #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

  <title>Mini App NFT</title>
</head>
<body>
  <body>

  <!-- ВСТАВИТЬ СЮДА -->
  <div id="loader">
    <div class="spinner"></div>
  </div>

  <h1>Ваши NFT</h1>
  <ul id="nft-list"></ul>

  <script>
    const API_URL = 'https://my-nft-portal.vercel.app/api/nfts';

    fetch(API_URL)
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById('nft-list');
        data.forEach(nft => {
          const li = document.createElement('li');
          li.innerHTML = `<img src="${nft.image}" width="100"> ${nft.name}`;
          list.appendChild(li);
        });
      });
  </script>
  <script>
  window.addEventListener("load", () => {
    const loader = document.getElementById("loader");
    loader.style.opacity = "0";
    loader.style.transition = "opacity 0.4s";
    setTimeout(() => loader.remove(), 400);
  });
</script>

</body>
</html>
