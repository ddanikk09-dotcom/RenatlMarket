<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mini App NFT</title>
  <style>
    body { margin:0; font-family: Arial; }

    /* Loader на весь экран */
    #loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 6px solid #222;
      border-top: 6px solid #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Скрываем интерфейс до конца загрузки */
    #app {
      display: none;
      padding: 20px;
      background: #111;
      color: #fff;
    }
  </style>
</head>
<body>

<!-- Loader -->
<div id="loader">
  <div class="spinner"></div>
</div>

<!-- Основной интерфейс -->
<div id="app">
  <h1 style="text-align:center;">Mini App NFT</h1>
  <ul id="nft-list"></ul>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
const loader = document.getElementById("loader");
const app = document.getElementById("app");

// Сообщаем Telegram, что Mini App готов
Telegram.WebApp.ready();

// Пример: имитация загрузки данных
setTimeout(() => {
  loader.remove(); // убираем черный фон и кружок
  app.style.display = "block"; // показываем интерфейс
}, 2000);

</body>
</html>
