<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Mini App NFT</title>
<style>
  body { margin:0; font-family:Arial, sans-serif; background:#111; color:#fff; }
  #loader {
    position: fixed; inset:0;
    background:#000; display:flex; justify-content:center; align-items:center; z-index:9999;
  }
  .spinner {
    width:60px; height:60px;
    border:6px solid #222; border-top:6px solid #fff;
    border-radius:50%;
    animation:spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #app { display:none; padding:20px; }
  ul { list-style:none; padding:0; }
  li { margin:10px 0; display:flex; align-items:center; }
  img { margin-right:10px; border-radius:5px; }
</style>
</head>
<body>

<!-- Loader -->
<div id="loader"><div class="spinner"></div></div>

<!-- Основной интерфейс -->
<div id="app">
  <h1 style="text-align:center;">Ваши NFT</h1>
  <ul id="nft-list"></ul>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
const loader = document.getElementById('loader');
const app = document.getElementById('app');

// Telegram Mini App готов
Telegram.WebApp.ready();

// Функция имитации загрузки NFT (замените на fetch с backend)
function loadNFTs() {
  return new Promise(resolve => {
    setTimeout(() => {
      resolve([
        { name:'NFT 1', image:'https://via.placeholder.com/80' },
        { name:'NFT 2', image:'https://via.placeholder.com/80' },
        { name:'NFT 3', image:'https://via.placeholder.com/80' }
      ]);
    }, 2000);
  });
}

// Загрузка и отображение NFT
loadNFTs().then(data => {
  const list = document.getElementById('nft-list');
  data.forEach(nft => {
    const li = document.createElement('li');
    li.innerHTML = `<img src="${nft.image}" width="80">${nft.name}`;
    list.appendChild(li);
  });
}).finally(() => {
  // Убираем loader, показываем интерфейс
  loader.remove();
  app.style.display = 'block';
});
</script>

</body>
</html>
